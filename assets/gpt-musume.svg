<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">GPT Musume checks the codebase</title>
  <desc id="desc">Anime-style project banner: GPT Musume reads a code intelligence report.</desc>
  <defs>
