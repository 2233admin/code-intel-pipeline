# Conservative Sentrux rule seed for one chosen project scope.
#
# Copy this file to <scope>/.sentrux/rules.toml, then replace the sample layers
# and boundaries with rules that describe the architecture you want to preserve.
# Keep the first version small: one cycle rule plus one or two real boundaries.

[constraints]
max_cycles = 0
# Optional: directories to skip in what-if scope-pollution checks.
# Default behavior includes a small built-in noisy list (node_modules, vendor, dist, tools ...).
# Use only for local build/support directories you do not want to govern yet.
# pollution_exclusions = ["tools", "third_party", "dist"]
# Optional: exclude test↔production dependency edges from DSM coupling metrics.
# Keep false if architectural review needs test-contract coupling to be measured.
# ignore_test_dependencies = true

[[layers]]
name = "core"
paths = ["src/core/*", "app/core/*"]
order = 0

[[layers]]
name = "service"
paths = ["src/service/*", "app/service/*"]
order = 1

[[layers]]
name = "api"
paths = ["src/api/*", "app/api/*"]
order = 2

[[boundaries]]
from = "app/api/*"
to = "app/core/internal/*"
reason = "API code should depend on the public core surface, not internal implementation."
