name: code-intel-ci

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  windows-build-test-package:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Validate repository layout and Skill package
        run: |
          python tests/test_repository_layout.py -v
          python tests/test_skill_package.py -v

      - name: Setup Rust
        shell: pwsh
        run: rustup default stable

      - name: Install ripgrep
        shell: pwsh
        run: choco install ripgrep -y --no-progress

      - name: Rust format
        shell: pwsh
        run: cargo fmt -p code-intel -- --check

      - name: Rust check
        shell: pwsh
        run: cargo check

      - name: Rust tests and core cross-contract gate
        shell: pwsh
        run: cargo test -p code-intel

      - name: Representative project orientation benchmark
        shell: pwsh
        run: cargo test -p code-intel --test project_orientation_benchmark -- --nocapture

      - name: Build Rust CLI
        shell: pwsh
        run: cargo build -p code-intel --release

      - name: PowerShell parser checks
        shell: pwsh
        run: |
          $files = @(
            "invoke-code-intel.ps1",
            "run-code-intel.ps1",
            "Invoke-ScopedRepowise.ps1",
            "Find-CodeIntelProjects.ps1",
            "Invoke-GitHubSolutionResearch.ps1",
            "scripts/tests/test-code-intel-pipeline.ps1",
            "scripts/tests/test-stable-wrapper-e2e.ps1",
            "scripts/tests/test-github-solution-research.ps1",
            "scripts/tests/test-hospital-trust-contract.ps1",
            "scripts/tests/test-atomic-capability-contract.ps1",
            "scripts/tests/test-project-discovery.ps1",
            "scripts/tests/test-project-management-support.ps1",
            "scripts/tests/Test-CodeIntelProjectConformance.ps1",
            "scripts/tests/test-code-intel-project-conformance.ps1",
            "Invoke-MultiAgentMergeQueue.ps1",
            "scripts/tests/test-multi-agent-merge-queue.ps1",
            "scripts/tests/test-integration-orchestration.ps1",
            "scripts/tests/Test-Python314PonCompatibility.ps1",
            "scripts/tests/test-python314-pon-compatibility.ps1",
            "scripts/tests/test-scoped-repowise-security.ps1",
            "scripts/tests/test-scoped-repowise-worktree.ps1",
            "scripts/tests/test-skill-development-benchmark.ps1",
            "tools/New-BetaPackage.ps1",
            "tools/Test-BetaPackage.ps1"
          )
          foreach ($file in $files) {
            $tokens = $null
            $errs = $null
            $null = [System.Management.Automation.Language.Parser]::ParseFile((Resolve-Path $file), [ref]$tokens, [ref]$errs)
            if ($errs) {
              Write-Host $file
              $errs | Select-Object Message,Extent | Format-List
              exit 1
            }
          }

      - name: Secret pattern guard
        shell: pwsh
        run: |
          $patterns = @(
            "sk-[A-Za-z0-9_-]{20,}",
            "ghp_[A-Za-z0-9_]{20,}",
            "github_pat_[A-Za-z0-9_]{20,}",
            "AKIA[0-9A-Z]{16}"
          )
          $files = git ls-files
          $hits = @()
          foreach ($file in $files) {
            if ($file -match "^(target/|artifacts/|cache/)" -or $file -match "\.(png|jpg|jpeg|gif|zip|exe)$") {
              continue
            }
            $text = Get-Content -LiteralPath $file -Raw -ErrorAction SilentlyContinue
            foreach ($pattern in $patterns) {
              if ($text -match $pattern) {
                $hits += "$file matches $pattern"
              }
            }
          }
          if ($hits.Count -gt 0) {
            $hits | ForEach-Object { Write-Host $_ }
            throw "Secret-like patterns found."
          }

      - name: Install portable pipeline
        shell: pwsh
        run: .\install-code-intel-pipeline.ps1 -RepoPath . -RepairSkillLinks -RequireRepowise:$false -Json

      - name: Add pipeline tools PATH
        shell: pwsh
        run: Add-Content -Path $env:GITHUB_PATH -Value "$env:LOCALAPPDATA\code-intel\bin"

      - name: Doctor
        shell: pwsh
        run: .\check-code-intel-tools.ps1 -RepoPath . -RequireRepowise:$false

      - name: GitHub research contract tests
        shell: pwsh
        run: .\scripts/tests/test-github-solution-research.ps1 -RepoPath .

      - name: Project discovery contract tests
        shell: pwsh
        run: .\scripts/tests/test-project-discovery.ps1 -RepoPath .

      - name: Project management support contract tests
        shell: pwsh
        run: .\scripts/tests/test-project-management-support.ps1 -RepoPath .

      - name: Atomic capability contract tests
        shell: pwsh
        run: .\scripts/tests/test-atomic-capability-contract.ps1 -RepoPath .

      - name: Skill development benchmark contract tests
        shell: pwsh
        run: .\scripts/tests/test-skill-development-benchmark.ps1 -RepoPath .

      - name: Hospital fail-closed contract tests
        shell: pwsh
        run: .\scripts/tests/test-hospital-trust-contract.ps1

      - name: Scoped Repowise trust-boundary tests
        shell: pwsh
        run: |
          .\scripts/tests/test-scoped-repowise-security.ps1
          .\scripts/tests/test-scoped-repowise-worktree.ps1

      - name: Scoped Repowise manifest validator tests
        run: python .\test-scoped-repowise-validator.py

      - name: Core PowerShell regression tests
        shell: pwsh
        run: .\scripts/tests/test-regression-fixes.ps1

      - name: Python 3.14 and project conformance
        shell: pwsh
        run: |
          .\scripts/tests/test-python314-pon-compatibility.ps1
          .\scripts/tests/test-integration-orchestration.ps1
          .\scripts/tests/test-code-intel-project-conformance.ps1

      - name: Pipeline smoke
        shell: pwsh
        run: .\scripts/tests/test-code-intel-pipeline.ps1 -RepoPath . -SkipRepowise -AllowGraphMissing -SkipSentruxGate -SkipGitHubResearch -Mode normal

      - name: Stable wrapper authoritative outcome E2E
        shell: pwsh
        run: .\scripts/tests/test-stable-wrapper-e2e.ps1

      - name: Package
        shell: pwsh
        run: ./tools/New-BetaPackage.ps1 -ExecutablePath ./target/release/code-intel.exe -OutputDirectory ./dist -PackageName code-intel-pipeline-windows-beta

      - name: Verify beta package
        shell: pwsh
        run: ./tools/Test-BetaPackage.ps1 -ZipPath ./dist/code-intel-pipeline-windows-beta.zip -Json

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: code-intel-pipeline-windows
          path: |
            dist/code-intel-pipeline-windows-beta.zip
            dist/code-intel-pipeline-windows-beta.zip.sha256
            dist/code-intel-pipeline-windows-beta.release-manifest.json

  cross-platform-smoke:
    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        os:
          - windows-latest
          - macos-latest
          - ubuntu-latest

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Validate repository layout and Skill package
        run: |
          python tests/test_repository_layout.py -v
          python tests/test_skill_package.py -v

      - name: Setup Rust
        shell: pwsh
        run: rustup default stable

      - name: Install ripgrep
        shell: pwsh
        run: |
          if ($IsWindows) {
            choco install ripgrep -y --no-progress
          }
          elseif ($IsMacOS) {
            brew install ripgrep
          }
          else {
            sudo apt-get update
            sudo apt-get install -y ripgrep
          }

      - name: Rust format
        shell: pwsh
        run: cargo fmt -p code-intel -- --check

      - name: Rust check
        shell: pwsh
        run: cargo check

      - name: Rust tests and core cross-contract gate
        shell: pwsh
        run: cargo test -p code-intel

      - name: Build Rust CLI
        shell: pwsh
        run: cargo build -p code-intel --release

      - name: PowerShell parser checks
        shell: pwsh
        run: |
          $files = @(
            "invoke-code-intel.ps1",
            "run-code-intel.ps1",
            "Invoke-ScopedRepowise.ps1",
            "Find-CodeIntelProjects.ps1",
            "Invoke-GitHubSolutionResearch.ps1",
            "scripts/tests/test-code-intel-pipeline.ps1",
            "scripts/tests/test-stable-wrapper-e2e.ps1",
            "scripts/tests/test-github-solution-research.ps1",
            "scripts/tests/test-hospital-trust-contract.ps1",
            "scripts/tests/test-atomic-capability-contract.ps1",
            "scripts/tests/test-project-discovery.ps1",
            "scripts/tests/test-project-management-support.ps1",
            "scripts/tests/Test-CodeIntelProjectConformance.ps1",
            "scripts/tests/test-code-intel-project-conformance.ps1",
            "Invoke-MultiAgentMergeQueue.ps1",
            "scripts/tests/test-multi-agent-merge-queue.ps1",
            "scripts/tests/test-integration-orchestration.ps1",
            "scripts/tests/Test-Python314PonCompatibility.ps1",
            "scripts/tests/test-python314-pon-compatibility.ps1",
            "scripts/tests/test-scoped-repowise-security.ps1",
            "scripts/tests/test-scoped-repowise-worktree.ps1",
            "scripts/tests/test-skill-development-benchmark.ps1",
            "tools/New-BetaPackage.ps1",
            "tools/Test-BetaPackage.ps1"
          )
          foreach ($file in $files) {
            $tokens = $null
            $errs = $null
            $null = [System.Management.Automation.Language.Parser]::ParseFile((Resolve-Path $file), [ref]$tokens, [ref]$errs)
            if ($errs) {
              Write-Host $file
              $errs | Select-Object Message,Extent | Format-List
              exit 1
            }
          }

      - name: Secret pattern guard
        shell: pwsh
        run: |
          $patterns = @(
            "sk-[A-Za-z0-9_-]{20,}",
            "ghp_[A-Za-z0-9_]{20,}",
            "github_pat_[A-Za-z0-9_]{20,}",
            "AKIA[0-9A-Z]{16}"
          )
          $files = git ls-files
          $hits = @()
          foreach ($file in $files) {
            if ($file -match "^(target/|artifacts/|cache/)" -or $file -match "\.(png|jpg|jpeg|gif|zip|exe)$") {
              continue
            }
            $text = Get-Content -LiteralPath $file -Raw -ErrorAction SilentlyContinue
            foreach ($pattern in $patterns) {
              if ($text -match $pattern) {
                $hits += "$file matches $pattern"
              }
            }
          }
          if ($hits.Count -gt 0) {
            $hits | ForEach-Object { Write-Host $_ }
            throw "Secret-like patterns found."
          }

      - name: Install portable pipeline
        shell: pwsh
        run: |
          $result = ./install-code-intel-pipeline.ps1 -RepoPath . -RepairSkillLinks -RequireRepowise:$false -Json | ConvertFrom-Json
          Add-Content -Path $env:GITHUB_PATH -Value $result.paths.bin

      - name: Doctor
        shell: pwsh
        run: ./check-code-intel-tools.ps1 -RepoPath . -RequireRepowise:$false -Json

      - name: Hospital fail-closed contract tests
        shell: pwsh
        run: ./scripts/tests/test-hospital-trust-contract.ps1

      - name: Atomic capability contract tests
        shell: pwsh
        run: ./scripts/tests/test-atomic-capability-contract.ps1 -RepoPath .

      - name: Scoped Repowise manifest validator tests
        run: python ./test-scoped-repowise-validator.py

      - name: Python 3.14 compatibility lane
        shell: pwsh
        run: ./scripts/tests/test-python314-pon-compatibility.ps1

      - name: Multi-agent merge queue contract
        shell: pwsh
        run: ./scripts/tests/test-multi-agent-merge-queue.ps1

      - name: Pipeline smoke
        shell: pwsh
        run: ./scripts/tests/test-code-intel-pipeline.ps1 -RepoPath . -SkipRepowise -AllowGraphMissing -SkipSentruxCheck -SkipSentruxGate -SkipGitHubResearch -Mode normal

      - name: Hardcoded path scan
        shell: pwsh
        run: ./tools/check-hardcoded-paths.ps1
