name: code-intel-release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Rust
        shell: pwsh
        run: rustup default stable

      - name: Rust format
        shell: pwsh
        run: cargo fmt -p code-intel -- --check

      - name: Rust check
        shell: pwsh
        run: cargo check

      - name: Rust tests
        shell: pwsh
        run: cargo test -p code-intel

      - name: Build Rust CLI
        shell: pwsh
        run: cargo build -p code-intel --release

      - name: Install ripgrep
        shell: pwsh
        run: choco install ripgrep -y --no-progress

      - name: Install portable pipeline
        shell: pwsh
        run: .\install-code-intel-pipeline.ps1 -RepoPath . -RepairSkillLinks -Json

      - name: Add pipeline tools PATH
        shell: pwsh
        run: Add-Content -Path $env:GITHUB_PATH -Value "$env:LOCALAPPDATA\code-intel\bin"

      - name: Doctor
        shell: pwsh
        # Runners don't install repowise; smoke runs on the lite fallback
        # (same as ci.yml). RequireRepowise defaults to $true since 0.2.0.
        run: .\check-code-intel-tools.ps1 -RepoPath . -RequireRepowise:$false

      - name: GitHub research contract tests
        shell: pwsh
        run: .\test-github-solution-research.ps1 -RepoPath .

      - name: Project discovery contract tests
        shell: pwsh
        run: .\test-project-discovery.ps1 -RepoPath .

      - name: Project management support contract tests
        shell: pwsh
        run: .\test-project-management-support.ps1 -RepoPath .

      - name: Skill development benchmark contract tests
        shell: pwsh
        run: .\test-skill-development-benchmark.ps1 -RepoPath .

      - name: On-demand evidence provider contract tests
        shell: pwsh
        run: .\test-evidence-providers.ps1

      - name: Pipeline smoke
        shell: pwsh
        run: .\test-code-intel-pipeline.ps1 -RepoPath . -SkipRepowise -AllowGraphMissing -SkipSentruxGate -SkipGitHubResearch -Mode normal

      - name: Package
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}"
          New-Item -ItemType Directory -Force dist\code-intel-pipeline\bin | Out-Null
          $files = git ls-files
          foreach ($file in $files) {
            if ($file -match "^\.gitignore$") {
              continue
            }
            $target = Join-Path "dist\code-intel-pipeline" $file
            New-Item -ItemType Directory -Force -Path (Split-Path -Parent $target) | Out-Null
            Copy-Item -LiteralPath $file -Destination $target -Force
          }
          Copy-Item -LiteralPath target\release\code-intel.exe -Destination dist\code-intel-pipeline\bin\code-intel.exe -Force
          Compress-Archive -Path dist\code-intel-pipeline -DestinationPath "dist\code-intel-pipeline-$version-windows.zip" -Force

      - name: Create GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ github.ref_name }}"
          $asset = "dist\code-intel-pipeline-$tag-windows.zip"
          gh release view $tag *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $tag $asset --clobber
          }
          elseif ($tag -match "-(alpha|beta|rc)(\.|$)") {
            gh release create $tag $asset --title $tag --notes "Code Intel Pipeline $tag" --prerelease
          }
          else {
            gh release create $tag $asset --title $tag --notes "Code Intel Pipeline $tag"
          }
